<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p id="result"></p>
    <script>
        function display(lett){
            document.getElementById("result").innerHTML = lett;
        }
        function calculate(num1,num2,callback){
            let sum = num1+num2;
            callback(sum);
        }   
        calculate(12,3,display);
    </script>
</body>
</html>
